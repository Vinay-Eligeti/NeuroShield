<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NeuroShield | Live Monitor</title>
    <link rel="stylesheet" href="monitor.css">
  </head>
  <body>
    <div class="dashboard">
      <div class="header">
        <div class="logo">🛡️ NEUROSHIELD</div>
        <div id="status-pill" class="pill">IDLE</div>
      </div>

      <div class="controls-bar">
        <div class="pill-group">
          <span id="asrStatus" class="pill">ASR OFF</span>
          <span id="analysisStatus" class="pill">ANALYSIS IDLE</span>
        </div>
        
        <div style="margin-left: auto; display: flex; gap: 12px; align-items: center;">
          <label style="font-size: 12px; color: var(--text-muted)">Language:</label>
          <select id="langSelect">
            <option value="en">English (US)</option>
            <option value="hi">Hindi (हिन्दी)</option>
          </select>
          
          <label style="font-size: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input id="playAudio" type="checkbox" />
            <span>Audio Playback</span>
          </label>
        </div>
      </div>

      <div class="main-viewport">
        <video id="preview" autoplay muted playsinline></video>
        <!-- Virtual Shield could be added here as an overlay later -->
      </div>

      <div class="side-panels">
        <!-- Transcript Panel -->
        <div class="panel">
          <div class="panel-title">📡 Live Intelligence Feed</div>
          <div class="transcript-area" id="log-container">
            <div id="transcript">Waiting for speech interaction…</div>
            <div id="interim"></div>
          </div>
        </div>

        <!-- Analysis Panel -->
        <div class="panel">
          <div class="panel-title">🚨 Threat Analysis</div>
          <div id="scam-status-text" style="font-weight: 700; font-size: 1.1rem;">Scanning Environment…</div>
          <div id="scamScore" class="scam-score-large">00%</div>
          <div id="scamPatterns" class="scam-patterns-list">
            <!-- Pattern tags injected here -->
          </div>
        </div>
      </div>
    </div>

    <canvas id="frameCanvas" width="640" height="360" style="display:none"></canvas>
    <script src="monitor.js"></script>
  </body>
</html>
